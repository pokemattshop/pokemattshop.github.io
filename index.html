
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokematt Shop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      background: linear-gradient(135deg, #ff4d4d, #ff9900);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    .hero button {
      padding: 10px 20px;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      margin-top: 15px;
    }

    .section {
      padding: 40px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <div><strong>Pokematt</strong></div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Deals</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to Pokematt</h1>
  <p>Cards, collectibles & mystery packs</p>
  <button>Shop Now</button>
</section>

<section class="section">
  <h2>Featured Items</h2>
  <div class="grid">
    <div class="card">Product 1</div>
    <div class="card">Product 2</div>
    <div class="card">Product 3</div>
    <div class="card">Product 4</div>
  </div>
</section>

<footer>
  © 2026 Pokematt. All rights reserved.
</footer>

</body>
</html>
